<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dansk Hør — Listen and pick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --card: #1c2333;
    --card-alt: #1a2744;
    --border: #2a3347;
    --accent: #4f8ef7;
    --accent2: #7dd3fc;
    --text: #e8edf5;
    --text-muted: #8896ae;
    --text-dim: #4a5568;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 12px;
    --card-radius: 16px;
    --header-h: 58px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  header { height: var(--header-h); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; background: rgba(14,17,23,0.95); backdrop-filter: blur(12px); z-index: 200; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stat-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .stat-pill b { color: var(--accent2); font-weight: 500; }

  .main { margin-top: var(--header-h); padding: 24px; max-width: 1180px; margin-left: auto; margin-right: auto; }
  .intro { padding: 6px 4px 18px; }
  .intro h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 4px; }
  .intro p { color: var(--text-muted); font-size: 13px; }

  .session-stats { display: flex; gap: 10px; margin-bottom: 18px; }
  .session-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 12px 16px; }
  .session-stat .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
  .session-stat .value { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent2); }

  .hor-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, 400px);
    gap: 20px;
    align-items: start;
    min-height: calc(100vh - var(--header-h) - 210px);
  }

  .deck-section { display: flex; flex-direction: column; min-height: 0; height: 100%; }
  .deck-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-shrink: 0; }
  .deck-toolbar h2 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: var(--text); }
  .deck-toolbar .deck-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 6px; }
  .deck-refresh { padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; transition: all 0.15s; white-space: nowrap; }
  .deck-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .deck-list {
    flex: 1;
    min-height: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow-y: auto;
  }
  .deck-item { display: grid; grid-template-columns: 32px minmax(0, 1fr) auto; gap: 2px 10px; width: 100%; padding: 10px 12px; border: none; border-bottom: 1px solid var(--border); background: transparent; color: inherit; text-align: left; cursor: pointer; transition: background 0.15s; align-items: start; }
  .deck-item:last-child { border-bottom: none; }
  .deck-item:hover { background: rgba(79, 142, 247, 0.06); }
  .deck-item.active { background: rgba(79, 142, 247, 0.12); box-shadow: inset 3px 0 0 var(--accent); }
  .deck-item.done { opacity: 0.55; }
  .deck-item.done.active { opacity: 1; }
  .deck-item.correct { box-shadow: inset 3px 0 0 var(--success); }
  .deck-item.wrong { box-shadow: inset 3px 0 0 var(--danger); }
  .deck-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); padding-top: 2px; }
  .deck-text { min-width: 0; }
  .deck-da { display: block; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; }
  .deck-en { display: none; font-size: 12px; color: var(--text-muted); line-height: 1.35; margin-top: 2px; }
  .deck-item.done .deck-en { display: block; }
  .deck-cat { display: inline-block; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; color: var(--accent2); margin-top: 4px; opacity: 0.85; }
  .deck-mark { font-size: 14px; line-height: 1; padding-top: 2px; }

  .player-section { position: sticky; top: calc(var(--header-h) + 16px); }
  .player-section .listen-card,
  .player-section .session-done { min-height: 420px; }

  .listen-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 36px 24px 28px; min-height: 320px; display: flex; flex-direction: column; align-items: center; gap: 22px; box-shadow: 0 8px 28px rgba(0,0,0,0.25); position: relative; }
  .badge-cat { position: absolute; top: 14px; left: 18px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent2); background: rgba(125,211,252,0.1); border: 1px solid rgba(125,211,252,0.3); padding: 2px 10px; border-radius: 12px; letter-spacing: 0.3px; }
  .badge-score { position: absolute; top: 14px; right: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .listen-prompt { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text-muted); margin-top: 22px; text-align: center; }
  .play-btn { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #3b5fc0, #4f8ef7); border: none; color: #fff; font-size: 42px; cursor: pointer; box-shadow: 0 8px 24px rgba(79,142,247,0.45); transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: center; justify-content: center; }
  .play-btn:hover { transform: scale(1.04); box-shadow: 0 10px 28px rgba(79,142,247,0.55); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn.speaking { animation: horPulse 1.2s ease-in-out infinite; }
  @keyframes horPulse { 0%,100% { box-shadow: 0 8px 24px rgba(79,142,247,0.45); } 50% { box-shadow: 0 8px 36px rgba(79,142,247,0.85); } }

  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 8px; }
  .answer-btn { padding: 14px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: left; min-height: 56px; }
  .answer-btn:hover:not(:disabled) { border-color: var(--accent); }
  .answer-btn:disabled { cursor: default; }
  .answer-btn.correct { border-color: var(--success); background: rgba(74,222,128,0.12); color: var(--success); }
  .answer-btn.wrong   { border-color: var(--danger);  background: rgba(248,113,113,0.12); color: var(--danger); }
  .answer-btn.faded   { opacity: 0.45; }
  .next-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; min-height: 38px; width: 100%; }
  .next-btn, .skip-btn { padding: 9px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; transition: all 0.15s; }
  .next-btn:hover, .skip-btn:hover { border-color: var(--accent); color: var(--accent); }
  .feedback { font-family: 'Inter', sans-serif; font-size: 13px; }
  .feedback.correct { color: var(--success); }
  .feedback.wrong   { color: var(--danger); }
  /* Post-answer reveal: shows the Danish word + IPA only AFTER the user picks. */
  .reveal-da { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: 4px; width: 100%; text-align: center; }
  .reveal-ipa { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); letter-spacing: 0.2px; margin-left: 6px; }

  .session-done { background: var(--card); border: 1px solid var(--success); border-radius: var(--card-radius); padding: 36px 28px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .session-done h2 { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 4px; }
  .session-done p { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
  .session-done .btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; transition: all 0.15s; }
  .session-done .btn:hover { border-color: var(--accent); color: var(--accent); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); padding: 10px 18px; border-radius: 24px; font-size: 12px; color: var(--text-muted); opacity: 0; transition: all 0.25s; z-index: 500; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .hor-layout { grid-template-columns: 1fr; min-height: 0; }
    .player-section { position: static; order: -1; }
    .player-section .listen-card,
    .player-section .session-done { min-height: 320px; }
    .deck-list { max-height: 50vh; flex: none; }
  }

  @media (max-width: 700px) {
    .main { padding: 14px; }
    .stat-pill { display: none; }
    .listen-prompt { font-size: 18px; margin-top: 16px; }
    .play-btn { width: 88px; height: 88px; font-size: 36px; }
    .answer-btn { font-size: 13px; padding: 12px 10px; min-height: 52px; }
  }
  @media (max-width: 500px) {
    .answers { grid-template-columns: 1fr; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">dansk<span>hør</span></div>
  <div class="header-right">
    <div class="stat-pill">Score <b id="hor-score">0/0</b></div>
    <div class="stat-pill">Accuracy <b id="hor-accuracy">—</b></div>
    <div class="stat-pill">Bank <b id="hor-bank-count">0</b></div>
  </div>
</header>

<div class="main">
  <div class="intro">
    <h1>Listen and pick</h1>
    <p>Tap play, then choose the English meaning. Work through the full deck — English answers stay hidden in the list until you answer.</p>
  </div>

  <div class="session-stats">
    <div class="session-stat"><div class="label">Remaining</div><div class="value" id="hor-queue-len">—</div></div>
    <div class="session-stat"><div class="label">Session score</div><div class="value" id="hor-stat-session">0/0</div></div>
    <div class="session-stat"><div class="label">All-time accuracy</div><div class="value" id="hor-stat-acc">—</div></div>
  </div>

  <div class="hor-layout">
    <aside class="deck-section">
      <div class="deck-toolbar">
        <h2>Full deck<span class="deck-count" id="hor-deck-total"></span></h2>
        <button type="button" class="deck-refresh" id="hor-refresh-deck">↻ New deck</button>
      </div>
      <div class="deck-list" id="hor-deck-list" aria-label="All phrases in deck"></div>
    </aside>

    <div class="player-section">
      <div id="hor-card-host"></div>
    </div>
  </div>
</div>

<div class="toast" id="hor-toast"></div>

<script src="phrases.js"></script>
<script src="speech.js"></script>
<script src="ipa.js"></script>

<script>
const PHRASES = (window.DanskPhrases && window.DanskPhrases.BANK) || [];
const PROGRESS_KEY = 'danskor:progress:v1';
const SEEN_KEY     = 'danskor:seen-counts:v1';

// ─── Danish TTS ────────────────────────────────────────────────────
// Delegates to window.DanskSpeech; falls back to minimal local TTS.
const synth = window.speechSynthesis;
function speak(text, opts) {
  opts = opts || {};
  text = String(text).replace(/\bI\b/g, 'i');
  if (window.DanskSpeech) return window.DanskSpeech.speak(text, opts);
  if (!synth) { if (opts.onerror) opts.onerror(new Error('no synth')); return null; }
  try { synth.cancel(); } catch (_) {}
  const u = new SpeechSynthesisUtterance(text);
  const v = synth.getVoices().find(v => /^da([-_]|$)/i.test(v.lang));
  if (v) u.voice = v;
  u.lang = 'da-DK';
  u.rate = opts.rate || 0.9;
  if (opts.onend) u.onend = opts.onend;
  if (opts.onerror) u.onerror = opts.onerror;
  synth.speak(u);
  return u;
}

// ─── Web Audio chime / buzz ────────────────────────────────────────
let _audioCtx = null;
function audioCtx() {
  if (_audioCtx) return _audioCtx;
  try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
  return _audioCtx;
}
function playChime() {
  const ctx = audioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  [{f:523.25,t:0},{f:783.99,t:0.10}].forEach(({f,t}) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, now+t);
    gain.gain.exponentialRampToValueAtTime(0.18, now+t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+t+0.30);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now+t);
    osc.stop(now+t+0.32);
  });
}
function playBuzz() {
  const ctx = audioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = 220;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.10, now+0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now+0.18);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now); osc.stop(now+0.20);
}

// ─── Helpers ───────────────────────────────────────────────────────
function pickRandom(arr, n) {
  const copy = arr.slice();
  const out = [];
  while (out.length < n && copy.length) {
    const i = Math.floor(Math.random() * copy.length);
    out.push(copy.splice(i, 1)[0]);
  }
  return out;
}
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function shuffleDeck(list) {
  const deck = list.slice();
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

// ─── State ─────────────────────────────────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); } catch (_) { return {}; }
}
function saveProgress(p) { try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch (_) {} }
function loadSeen() {
  try { return JSON.parse(localStorage.getItem(SEEN_KEY) || '{}'); } catch (_) { return {}; }
}
function saveSeen(s) { try { localStorage.setItem(SEEN_KEY, JSON.stringify(s)); } catch (_) {} }

let progress = loadProgress();
let seenCounts = loadSeen();
progress.seen = progress.seen || 0;
progress.correct = progress.correct || 0;

let sessionScore = 0;
let sessionTotal = 0;
let sessionResults = {};
let queue = [];
let qIdx = 0;
let audioUnlocked = false;

function pickDistractors(correct, n) {
  const sameCat = PHRASES.filter(p => p.cat === correct.cat && p.id !== correct.id);
  const pool = sameCat.length >= n ? sameCat : PHRASES.filter(p => p.id !== correct.id);
  return pickRandom(pool, n);
}

const host = document.getElementById('hor-card-host');
const deckList = document.getElementById('hor-deck-list');
const deckTotal = document.getElementById('hor-deck-total');
const refreshBtn = document.getElementById('hor-refresh-deck');
const toast = document.getElementById('hor-toast');

if (refreshBtn) refreshBtn.addEventListener('click', newDeck);

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2400);
}

function refreshHeaderStats() {
  const scoreEl = document.getElementById('hor-score');
  const accEl   = document.getElementById('hor-accuracy');
  const bankEl  = document.getElementById('hor-bank-count');
  const queueLenEl = document.getElementById('hor-queue-len');
  const sessionStat = document.getElementById('hor-stat-session');
  const accStat = document.getElementById('hor-stat-acc');
  if (scoreEl) scoreEl.textContent = sessionScore + '/' + sessionTotal;
  if (sessionStat) sessionStat.textContent = sessionScore + '/' + sessionTotal;
  if (queueLenEl) queueLenEl.textContent = Math.max(0, queue.length - qIdx);
  if (bankEl) bankEl.textContent = PHRASES.length;
  const lifePct = progress.seen ? Math.round((progress.correct / progress.seen) * 100) : null;
  if (accEl) accEl.textContent = lifePct === null ? '—' : (lifePct + '%');
  if (accStat) accStat.textContent = lifePct === null ? '—' : (lifePct + '%');
}

function renderDeckList() {
  if (!deckList) return;
  if (deckTotal) deckTotal.textContent = '(' + queue.length + ')';
  deckList.innerHTML = queue.map((p, i) => {
    const cls = ['deck-item'];
    const result = sessionResults[p.id];
    if (i === qIdx) cls.push('active');
    if (result) {
      cls.push('done', result);
    }
    const mark = result === 'correct' ? '✓' : (result === 'wrong' ? '✗' : '');
    return (
      '<button type="button" class="' + cls.join(' ') + '" data-idx="' + i + '">' +
        '<span class="deck-num">' + (i + 1) + '</span>' +
        '<span class="deck-text">' +
          '<span class="deck-da">' + escapeHtml(p.da) + '</span>' +
          '<span class="deck-en">' + escapeHtml(p.en) + '</span>' +
          '<span class="deck-cat">' + escapeHtml(p.cat) + '</span>' +
        '</span>' +
        '<span class="deck-mark" aria-hidden="true">' + mark + '</span>' +
      '</button>'
    );
  }).join('');
  deckList.querySelectorAll('.deck-item').forEach(btn => {
    btn.addEventListener('click', () => {
      qIdx = parseInt(btn.dataset.idx, 10);
      renderQuestion();
    });
  });
  const active = deckList.querySelector('.deck-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function newDeck() {
  queue = shuffleDeck(PHRASES);
  qIdx = 0;
  sessionScore = 0;
  sessionTotal = 0;
  sessionResults = {};
  renderQuestion();
  showToast('Deck shuffled — ' + queue.length + ' phrases');
}

function skipQuestion() {
  qIdx++;
  renderQuestion();
}

function renderQuestion() {
  refreshHeaderStats();
  renderDeckList();
  if (qIdx >= queue.length) {
    const pct = sessionTotal ? Math.round((sessionScore / sessionTotal) * 100) : 0;
    host.innerHTML =
      '<div class="session-done">' +
        '<h2>Deck complete</h2>' +
        '<p>You scored ' + sessionScore + '/' + sessionTotal + ' (' + pct + '%) this round.</p>' +
        '<button class="btn" id="hor-restart">↻ New deck</button>' +
      '</div>';
    host.querySelector('#hor-restart').addEventListener('click', newDeck);
    return;
  }

  const correct = queue[qIdx];
  const distractors = pickDistractors(correct, 3);
  const options = pickRandom([correct, ...distractors], 4);
  host.innerHTML =
    '<div class="listen-card">' +
      '<span class="badge-cat">' + escapeHtml(correct.cat) + '</span>' +
      '<span class="badge-score">' + (qIdx + 1) + ' / ' + queue.length + '</span>' +
      '<div class="listen-prompt">What did you hear?</div>' +
      '<button class="play-btn" id="hor-play-btn" aria-label="Replay Danish audio">▶</button>' +
      '<div class="answers" id="hor-answers">' +
        options.map(o => '<button class="answer-btn" data-correct="' + (o.id === correct.id ? '1' : '0') + '" data-id="' + o.id + '">' + escapeHtml(o.en) + '</button>').join('') +
      '</div>' +
      '<div class="next-row" id="hor-next-row">' +
        '<button class="skip-btn" id="hor-skip-btn" type="button">Skip →</button>' +
      '</div>' +
    '</div>';

  const playBtn = host.querySelector('#hor-play-btn');
  function playOnce() {
    audioUnlocked = true;
    playBtn.classList.add('speaking');
    speak(correct.da, {
      onend: () => playBtn.classList.remove('speaking'),
      onerror: () => playBtn.classList.remove('speaking'),
    });
  }
  playBtn.addEventListener('click', playOnce);
  if (audioUnlocked) setTimeout(playOnce, 250);

  host.querySelector('#hor-skip-btn').addEventListener('click', skipQuestion);

  const answerBtns = host.querySelectorAll('.answer-btn');
  const nextRow = host.querySelector('#hor-next-row');
  answerBtns.forEach(b => {
    b.addEventListener('click', () => {
      if (b.disabled) return;
      const isCorrect = b.dataset.correct === '1';
      sessionTotal++;
      progress.seen++;
      seenCounts[correct.id] = (seenCounts[correct.id] || 0) + 1;
      sessionResults[correct.id] = isCorrect ? 'correct' : 'wrong';
      if (isCorrect) {
        sessionScore++;
        progress.correct++;
        playChime();
        b.classList.add('correct');
      } else {
        playBuzz();
        b.classList.add('wrong');
        answerBtns.forEach(x => { if (x.dataset.correct === '1') x.classList.add('correct'); });
      }
      answerBtns.forEach(x => { if (x !== b && !x.classList.contains('correct')) x.classList.add('faded'); x.disabled = true; });
      saveProgress(progress); saveSeen(seenCounts);
      // After the user answers, reveal the Danish word + IPA (it's safe now;
      // before the answer this would have given away the spelling).
      const ipa = (window.DanskSpeech && window.DanskSpeech.lookupIpa(correct.da)) || '';
      const reveal = '<div class="reveal-da">' + escapeHtml(correct.da)
        + (ipa ? ' <span class="reveal-ipa">' + escapeHtml(ipa) + '</span>' : '')
        + '</div>';
      const fb = isCorrect
        ? '<span class="feedback correct">Correct — well heard.</span>'
        : '<span class="feedback wrong">Right answer: ' + escapeHtml(correct.en) + '</span>';
      nextRow.innerHTML = reveal + fb + ' <button class="next-btn" id="hor-next-btn" type="button">Next →</button>';
      nextRow.querySelector('#hor-next-btn').addEventListener('click', () => {
        qIdx++;
        renderQuestion();
      });
      refreshHeaderStats();
      renderDeckList();
    });
  });
  refreshHeaderStats();
}

queue = shuffleDeck(PHRASES);
qIdx = 0;
renderQuestion();

// Shared voice indicator + one-time onboarding banner.
if (window.DanskSpeech) {
  window.DanskSpeech.mountVoiceIndicator('.header-right');
  window.DanskSpeech.mountOnboardingBanner();
}
</script>

</body>
</html>
